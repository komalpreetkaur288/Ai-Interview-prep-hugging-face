<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview - AI virtual interview preparation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- RecordRTC records directly as 16kHz WAV — no manual conversion needed -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"> AI virtual interview preparation</div>
        <div class="nav-links" style="display: flex; align-items: center; gap: 15px;">
            <span class="progress-text">Question {{ index + 1 }} of {{ total }}</span>
            <button class="btn btn-outline" style="padding: 6px 12px; font-size: 14px; color: #dc2626; border-color: #dc2626;" onclick="cancelInterview()">Cancel Interview</button>
        </div>
    </nav>

    <!-- Floating Camera Feed -->
    <div class="camera-float" id="cameraFloat">
        <video id="cameraFeed" autoplay muted playsinline></video>
        <div class="camera-float-label" id="camLabel">📷 Starting...</div>
        <div class="camera-float-overlay" id="cameraFloatOverlay"><span>📷</span></div>
    </div>

    <div class="container">
        <div class="interview-wrapper">

            <!-- Progress Bar -->
            <div class="progress-bar-wrap">
                <div class="progress-bar" style="width: {{ ((index) / total * 100)|int }}%"></div>
            </div>

            <!-- Timer -->
            <div class="timer-section">
                <div class="timer-circle" id="timerCircle">
                    <span id="timerDisplay">60</span>
                    <small>sec</small>
                </div>
            </div>

            <!-- Question Card -->
            <div class="card question-card">
                <div class="question-header">
                    <span class="question-badge">Q{{ index + 1 }}</span>
                    <button type="button" class="btn-speak" id="speakBtn" onclick="speakQuestion()">🔊 Speak</button>
                </div>
                <h2 class="question-text">{{ question }}</h2>
            </div>

            <!-- Answer Form -->
            <div class="card answer-card">
                <form method="POST" action="/submit" id="answerForm">
                    <input type="hidden" name="skipped" id="skippedInput" value="false">

                    <div class="answer-header">
                        <label for="answerText">Your Answer</label>
                        <button type="button" class="btn-mic" id="micBtn" onclick="toggleMic()">🎤 Speak Answer</button>
                    </div>

                    <!-- STT status bar -->
                    <div class="stt-status" id="sttStatus" style="display:none">
                        <span class="stt-dot" id="sttDot"></span>
                        <span id="sttStatusText">Ready</span>
                    </div>

                    <textarea name="answer" id="answerText"
                        placeholder="Type your answer here, OR click '🎤 Speak Answer' → speak → click '⏹ Stop & Transcribe'. Your spoken words will appear here."
                        rows="6"></textarea>

                    <div class="char-count" id="charCount">0 characters</div>

                    <div class="btn-group">
                        <button type="button" class="btn btn-warning" onclick="skipQuestion()">⏭️ Skip</button>
                        <button type="button" class="btn btn-outline"  onclick="clearAnswer()">🗑️ Clear</button>
                        <button type="submit"  class="btn btn-primary"  onclick="submitAnswer()">Next ➡️</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script>
        const questionText = {{ question | tojson }};
        let timeLeft     = 60;
        let timerInterval;
        let autoSubmitted = false;
        let isIntentionalNavigation = false;
        let cameraStream  = null;
        let currentAudio  = null;

        // ─── RecordRTC state ──────────────────────────────────────────────────
        let rtcRecorder  = null;
        let micStream    = null;
        let isRecording  = false;

        // ─── CAMERA ───────────────────────────────────────────────────────────
        async function startCamera() {
            const video   = document.getElementById('cameraFeed');
            const overlay = document.getElementById('cameraFloatOverlay');
            const label   = document.getElementById('camLabel');
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = cameraStream;
                overlay.style.display = 'none';
                label.textContent = '🟢 Live';
                label.style.color = '#4ade80';
            } catch {
                label.textContent = '🔴 No Camera';
                label.style.color = '#f87171';
            }
        }

        // ─── TIMER ────────────────────────────────────────────────────────────
        function startTimer() {
            const display = document.getElementById('timerDisplay');
            const circle  = document.getElementById('timerCircle');
            timerInterval = setInterval(() => {
                timeLeft--;
                display.textContent = timeLeft;
                if (timeLeft <= 10) circle.classList.add('timer-warning');
                if (timeLeft <= 0 && !autoSubmitted) {
                    clearInterval(timerInterval);
                    autoSubmitted = true;
                    isIntentionalNavigation = true;
                    stopMic();
                    stopCamera();
                    alert('⏰ Time is up! Moving to next question.');
                    document.getElementById('skippedInput').value = 'false';
                    document.getElementById('answerForm').submit();
                }
            }, 1000);
        }

        // ─── TTS — gTTS backend generates MP3, played via Audio element ───────
        async function speakQuestion() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            const btn = document.getElementById('speakBtn');
            btn.textContent = '⏳ Loading...';
            btn.disabled = true;
            try {
                const res  = await fetch('/api/tts?text=' + encodeURIComponent(questionText));
                if (!res.ok) throw new Error('Server error ' + res.status);
                const blob = await res.blob();
                const url  = URL.createObjectURL(blob);
                currentAudio = new Audio(url);
                currentAudio.onended = () => {
                    btn.textContent = '🔊 Speak Again';
                    btn.disabled = false;
                    URL.revokeObjectURL(url);
                };
                currentAudio.play();
                btn.textContent = '🔊 Playing...';
                btn.disabled = false;
            } catch (e) {
                btn.textContent = '🔊 Speak';
                btn.disabled = false;
                showMsg('TTS error: ' + e.message, 'error');
            }
        }

        // ─── STT — Realtime Deepgram WebSockets ───
        let dgSocket = null;
        const dgKey = "{{ dg_key }}";

        async function toggleMic() {
            if (isRecording) {
                stopMic();
            } else {
                await startMic();
            }
        }

        async function startMic() {
            if (!dgKey) {
                showMsg('Deepgram API Key not configured. Check your .env file.', 'error');
                return;
            }

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                dgSocket = new WebSocket('wss://api.deepgram.com/v1/listen?punctuate=true&model=nova-2', ['token', dgKey]);
                
                dgSocket.onopen = () => {
                    const mediaRecorder = new MediaRecorder(micStream, { mimeType: 'audio/webm' });
                    
                    mediaRecorder.addEventListener('dataavailable', event => {
                        if (event.data.size > 0 && dgSocket.readyState === 1) {
                            dgSocket.send(event.data);
                        }
                    });
                    
                    mediaRecorder.start(250); // Send audio chunks every 250ms
                    rtcRecorder = mediaRecorder; 
                    
                    isRecording = true;
                    setMicUI('recording');
                };
                
                dgSocket.onmessage = (message) => {
                    const received = JSON.parse(message.data);
                    // Check if it's a valid transcript response
                    if (received.channel && received.channel.alternatives && received.channel.alternatives[0]) {
                        const transcript = received.channel.alternatives[0].transcript;
                        if (transcript && received.is_final) {
                            const ta = document.getElementById('answerText');
                            const current = ta.value.trimEnd();
                            ta.value = current ? current + ' ' + transcript : transcript;
                            updateCharCount();
                            ta.scrollTop = ta.scrollHeight;
                        }
                    }
                };
                
                dgSocket.onerror = (error) => {
                    showMsg('Deepgram WebSocket error', 'error');
                    stopMic();
                };
                
                dgSocket.onclose = () => {
                    if (isRecording) stopMic();
                };

            } catch (err) {
                showMsg('Microphone access denied or error starting stream.', 'error');
            }
        }

        function stopMic() {
            if (!isRecording) return;
            isRecording = false;
            
            if (rtcRecorder && rtcRecorder.state !== 'inactive') {
                rtcRecorder.stop();
            }
            if (micStream) {
                micStream.getTracks().forEach(t => t.stop());
            }
            if (dgSocket && dgSocket.readyState === 1) {
                dgSocket.send(JSON.stringify({ type: 'CloseStream' }));
                setTimeout(() => dgSocket.close(), 500); // Give it a moment to send the closing frame
            }
            
            setMicUI('done');
            showMsg('✅ Transcription stopped.', 'success');
        }

        // ─── UI helpers ───────────────────────────────────────────────────────
        function setMicUI(state) {
            const btn  = document.getElementById('micBtn');
            const box  = document.getElementById('sttStatus');
            const text = document.getElementById('sttStatusText');
            const dot  = document.getElementById('sttDot');
            btn.disabled = false;
            btn.classList.remove('listening');
            box.className = 'stt-status';

            switch (state) {
                case 'recording':
                    btn.innerHTML = '⏹ Stop Recording';
                    btn.classList.add('listening');
                    box.style.display = 'flex';
                    box.classList.add('stt-recording');
                    dot.style.background = '#dc2626';
                    text.textContent = '🔴 Recording and transcribing live…';
                    break;
                case 'done':
                    btn.innerHTML = '🎤 Speak More';
                    box.style.display = 'none';
                    break;
                default:
                    btn.innerHTML = '🎤 Speak Answer';
                    box.style.display = 'none';
            }
        }

        function showMsg(msg, type) {
            const box  = document.getElementById('sttStatus');
            const text = document.getElementById('sttStatusText');
            const dot  = document.getElementById('sttDot');
            box.style.display = 'flex';
            box.className = 'stt-status stt-' + type;
            dot.style.background = type === 'success' ? '#059669' : '#dc2626';
            text.textContent = msg;
            setTimeout(() => { box.style.display = 'none'; }, 5000);
        }

        function updateCharCount() {
            document.getElementById('charCount').textContent =
                document.getElementById('answerText').value.length + ' characters';
        }

        function clearAnswer() {
            stopMic();
            document.getElementById('answerText').value = '';
            updateCharCount();
        }

        function stopCamera() {
            if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
            if (currentAudio)  { currentAudio.pause(); currentAudio = null; }
        }

        function skipQuestion() {
            isIntentionalNavigation = true;
            clearInterval(timerInterval);
            stopMic();
            stopCamera();
            document.getElementById('skippedInput').value = 'true';
            document.getElementById('answerText').value   = 'SKIPPED';
            document.getElementById('answerForm').submit();
        }

        function submitAnswer() {
            isIntentionalNavigation = true;
            clearInterval(timerInterval);
            stopMic();
            stopCamera();
        }

        function cancelInterview() {
            if (confirm("Are you sure you want to cancel this interview? All progress will be lost.")) {
                isIntentionalNavigation = true;
                window.location.href = '/cancel';
            }
        }

        document.getElementById('answerText').addEventListener('input', updateCharCount);

        window.addEventListener('load', () => {
            // If the user refreshed the page, automatically cancel the interview
            const navEntries = performance.getEntriesByType("navigation");
            if (navEntries.length > 0 && navEntries[0].type === "reload") {
                window.location.href = '/cancel';
                return;
            }

            startCamera();
            startTimer();
            setTimeout(speakQuestion, 800);
        });
        window.addEventListener('beforeunload', (e) => {
            stopCamera();
            if (!isIntentionalNavigation) {
                e.preventDefault();
                e.returnValue = ''; // Required to show the browser warning dialog
            }
        });
    </script>
</body>
</html>
